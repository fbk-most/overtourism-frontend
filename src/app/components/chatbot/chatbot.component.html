<!-- Floating button -->
<div class="chatbot-button" (click)="toggle()">
  💬
</div>

<!-- Chat window -->
<div class="chatbot-window" *ngIf="isOpen">
  <div class="chatbot-header">
    Chatbot
    <span class="close" (click)="toggle()">✕</span>
  </div>

  <div class="chatbot-messages">
    <div
      *ngFor="let msg of messages"
      [class.user]="msg.sender === 'user'"
      [class.bot]="msg.sender === 'bot'"
    >
      <!-- Remove <pre> and just use a div for wrapping -->
      <div class="message-text">{{ msg.text }}</div>
    </div>

    <!-- Typing indicator -->
    <div *ngIf="isTyping" class="bot typing">
      <div class="message-text">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chatbot-input">
    <input
      type="text"
      [(ngModel)]="inputText"
      (keydown.enter)="send()"
      placeholder="Type your message here.."
    />
    <button itButton="primary" (click)="send()">Send</button>
  </div>
</div>
